<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Manu 💙</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    p {
      line-height: 1.7;
      font-size: 16px;
      white-space: pre-line;
    }

    .btn {
      display: block;
      margin: 20px auto 0;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #764ba2;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>💌 Para você, Manu</h1>
    <p id="mensagem"></p>
    <button class="btn" onclick="mostrarTexto()">Clique para ler 💙</button>
  </div>

  <script>
    const texto = `Boa noite, Manu. Tudo bem?

Eu pensei muito em como escrever esse texto… de verdade. Porque quando a gente vai falar de alguém que tem tanto carinho e admiração, parece que faltam palavras.

Essa semana não tem sido fácil, né? Eu costumo dizer que sinto quando as pessoas que eu gosto não estão bem… e eu senti isso em você. Você não tem noção do quanto eu orei pela sua vida esses dias, e pedindo pra que você estivesse bem e em paz.

Eu sei que não tem sido um momento fácil, mas queria que você soubesse que, independente de qualquer coisa, eu tenho muito orgulho de você. De verdade. Você é uma daquelas pessoas que chegaram na minha vida de um jeito inesperado e até mesmo inusitado, mas que mudaram completamente a minha historia. Assim como a Fabi e a Moulin, você tem um lugar muito especial no meu coração.

Eu lembro até hoje da primeira vez que você falou comigo, naquela brincadeira sobre eu e a Fabi… pode parecer bobo, mas ficou completamente marcado em minha vida. E desde então, você sempre me apoiou em vários momentos da minha vida e até mesmo um bem recente rs.

Sendo bem sincero, toda vez que eu olho pra você, eu vejo algo diferente… eu vejo uma presença de Cristo. Vejo alguém cheio do Espírito Santo, com uma presença que não dá nem pra explicar direito. É o tipo de pessoa que dá vontade de sentar, conversar sobre Cristo e ficar conversando sobre coisas aleatórias por horas.

Eu não sou muito bom com palavras, mas quando a gente tem tanta afeição por alguém, a gente tenta se expressar da melhor forma possível. E eu nunca tive muita coragem de te falar tudo isso antes, mas eu tenho carinho e admiração pela pessoa que você é.

Quero que você saiba que pode contar comigo pra qualquer coisa. Qualquer coisa mesmo. Se precisar me ligar 4h ou 5h da manhã, eu vou estar aqui e vou atender o telefone sem pensar duas vezes, até porque amigos servem pra isso, não é mesmo?

Por favor, eu não sei o que tem acontecido na sua vida, mas melhore… porque você é uma das pessoas mais contagiantes e alegres que eu conheço, com um dos sorrisos mais bonitos que eu já vi. Seria muito triste ver alguém tão especial perder esse brilho.

Eu me importo muito com você. E, se for preciso, eu faria o impossível pra te ver bem.

Então guarda tudo isso com carinho, tá?

Eu fiquei muito feliz de ter te tirado no amigo oculto. De verdade. Eu tinha orado tanto por você… e parece que Deus me deu uma resposta através disso.

Obrigado por existir, por fazer parte da minha vida e por ser exatamente quem você é.

E espero que você goste do chocolate. Ele não foi só uma forma de tentar arrancar um sorriso seu… foi uma forma de gratidão por tudo que você já fez por mim.

E eu tenho quase certeza que agora você tá com aquele sorrisinho de “Droga, o Gabriel me fez chorar” 😂 mas saiba que eu faria todas as palhaçadas do mundo pra te ver bem, minha amiga!

Enfim… o que eu queria te dizer com tudo isso é: mantenha seu sorriso, Manuelle. Pessoas com uma alma como a sua são únicas.

Quando se sentir triste, só me manda uma mensagem. Eu sempre vou estar aqui por você.

Com carinho,  
Gabriel 💙`;

    function mostrarTexto() {
      let i = 0;
      const speed = 20; // mais rápido por ser texto grande
      const msg = document.getElementById("mensagem");
      msg.innerHTML = "";

      function typeWriter() {
        if (i < texto.length) {
          msg.innerHTML += texto.charAt(i);
          i++;
          setTimeout(typeWriter, speed);
        }
      }

      typeWriter();
    }
  </script>

</body>
</html>
